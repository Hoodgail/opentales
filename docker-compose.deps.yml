services:
  postgres:
    image: postgres:16-alpine
    container_name: opentales-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opentales
      POSTGRES_USER: opentales
      POSTGRES_PASSWORD: opentales
    ports:
      - "5432:5432"
    volumes:
      - opentales-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  opentales-postgres-data:
